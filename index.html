<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobi Hub Calculator</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F9FAFB;
            --card-bg: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border-color: #E5E7EB;
            --error-color: #EF4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 900px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            padding: 40px;
            border: 1px solid var(--border-color);
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 30px;
            color: var(--text-main);
        }

        .input-group {
            display: flex;
            gap: 12px;
            max-width: 500px;
            margin: 0 auto 20px;
        }

        input[type="number"] {
            flex: 1;
            padding: 14px 16px;
            font-size: 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            transition: all 0.2s;
            background-color: var(--bg-color);
        }

        input[type="number"]:focus {
            border-color: var(--primary);
            background-color: var(--card-bg);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        button {
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 500;
            color: white;
            background-color: var(--primary);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .error-message {
            color: var(--error-color);
            text-align: center;
            min-height: 20px;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .results-section {
            display: none;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.4s ease-out;
        }

        .results-section.active {
            display: flex;
        }

        .results-row {
            display: flex;
            width: 100%;
            overflow-x: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 24px;
            background: var(--bg-color);
            /* Hide scrollbar for cleaner look but keep functionality */
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .results-row::-webkit-scrollbar {
            display: none;
        }

        .result-cell {
            flex: 1;
            min-width: 100px;
            padding: 16px;
            text-align: center;
            border-right: 1px solid var(--border-color);
        }

        .result-cell:last-child {
            border-right: none;
        }

        .cell-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .cell-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-main);
        }

        .copy-btn {
            background-color: white;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .copy-btn:hover {
            background-color: var(--bg-color);
        }

        .copy-btn svg {
            width: 18px;
            height: 18px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .input-group {
                flex-direction: column;
            }
            .container {
                padding: 24px 16px;
            }
            .result-cell {
                min-width: 80px;
                padding: 12px 8px;
            }
            .cell-value {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Mobi Hub Calculator</h1>
        
        <div class="input-group">
            <input type="number" id="basePrice" placeholder="Enter Base Price (X)" step="0.01" autocomplete="off">
            <button onclick="performCalculations()">Calculate</button>
        </div>
        
        <div id="errorMsg" class="error-message"></div>

        <div id="resultsSection" class="results-section">
            <div class="results-row" id="resultsRow">
                <div class="result-cell">
                    <div class="cell-label">X</div>
                    <div class="cell-value" id="valX">0.00</div>
                </div>
                <div class="result-cell">
                    <div class="cell-label">Y (-11%)</div>
                    <div class="cell-value" id="valY">0.00</div>
                </div>
                <div class="result-cell">
                    <div class="cell-label">Z (-25)</div>
                    <div class="cell-value" id="valZ">0.00</div>
                </div>
                <div class="result-cell">
                    <div class="cell-label">A (-5%)</div>
                    <div class="cell-value" id="valA">0.00</div>
                </div>
                <div class="result-cell">
                    <div class="cell-label">B (-7%)</div>
                    <div class="cell-value" id="valB">0.00</div>
                </div>
                <div class="result-cell">
                    <div class="cell-label">P1 (-3%)</div>
                    <div class="cell-value" id="valP1">0.00</div>
                </div>
                <div class="result-cell">
                    <div class="cell-label">P2 (-3%)</div>
                    <div class="cell-value" id="valP2">0.00</div>
                </div>
            </div>

            <button class="copy-btn" id="copyBtn" onclick="copyResults()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                </svg>
                <span id="copyText">Copy Results</span>
            </button>
        </div>
    </div>

    <script>
        // Listen for "Enter" key press on the input field
        document.getElementById('basePrice').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                performCalculations();
            }
        });

        function performCalculations() {
            const inputVal = document.getElementById('basePrice').value;
            const errorMsg = document.getElementById('errorMsg');
            const resultsSection = document.getElementById('resultsSection');

            // Validation
            if (!inputVal || isNaN(inputVal) || Number(inputVal) <= 0) {
                errorMsg.textContent = "Please enter a valid positive number.";
                resultsSection.classList.remove('active');
                return;
            }

            errorMsg.textContent = "";

            // The Math
            const X = parseFloat(inputVal);
            const Y = X - (X * 0.11);
            const Z = Y - 25;
            const A = Z - (Z * 0.05);
            const B = Z - (Z * 0.07);
            const P1 = A - (A * 0.03);
            const P2 = B - (B * 0.03);

            // Update DOM with 2 decimal formatting
            document.getElementById('valX').textContent = X.toFixed(2);
            document.getElementById('valY').textContent = Y.toFixed(2);
            document.getElementById('valZ').textContent = Z.toFixed(2);
            document.getElementById('valA').textContent = A.toFixed(2);
            document.getElementById('valB').textContent = B.toFixed(2);
            document.getElementById('valP1').textContent = P1.toFixed(2);
            document.getElementById('valP2').textContent = P2.toFixed(2);

            // Show Results
            resultsSection.classList.add('active');
        }

        function copyResults() {
            // Retrieve calculated values
            const X = document.getElementById('valX').textContent;
            const Y = document.getElementById('valY').textContent;
            const Z = document.getElementById('valZ').textContent;
            const A = document.getElementById('valA').textContent;
            const B = document.getElementById('valB').textContent;
            const P1 = document.getElementById('valP1').textContent;
            const P2 = document.getElementById('valP2').textContent;

            // Format as a single row with separators
            const copyString = `${X} | ${Y} | ${Z} | ${A} | ${B} | ${P1} | ${P2}`;

            // Create temporary textarea to facilitate copying in environments like iFrames
            const textarea = document.createElement('textarea');
            textarea.value = copyString;
            
            // Move it off-screen
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            textarea.style.top = '0';
            
            document.body.appendChild(textarea);
            textarea.select();

            const copyBtnText = document.getElementById('copyText');
            const originalText = copyBtnText.textContent;

            try {
                document.execCommand('copy');
                // Provide visual feedback
                copyBtnText.textContent = "Copied!";
                setTimeout(() => {
                    copyBtnText.textContent = originalText;
                }, 2000);
            } catch (err) {
                // Error feedback
                copyBtnText.textContent = "Failed to copy";
                setTimeout(() => {
                    copyBtnText.textContent = originalText;
                }, 2000);
            } finally {
                document.body.removeChild(textarea);
            }
        }
    </script>
</body>
</html>
