<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobi Hub Calculator</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F9FAFB;
            --card-bg: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border-color: #E5E7EB;
            --error-color: #EF4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 900px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            padding: 40px;
            border: 1px solid var(--border-color);
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 30px;
            color: var(--text-main);
        }

        .input-group {
            display: flex;
            gap: 12px;
            max-width: 500px;
            margin: 0 auto 20px;
        }

        .selection-group {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            width: 100%;
            margin: 0 auto 24px;
        }

        select {
            width: 100%;
            padding: 14px 16px;
            font-size: 14px;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            transition: all 0.2s;
            background-color: var(--bg-color);
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236B7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
            cursor: pointer;
        }

        select:focus {
            border-color: var(--primary);
            background-color: var(--card-bg);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        input[type="number"] {
            flex: 1;
            padding: 14px 16px;
            font-size: 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            transition: all 0.2s;
            background-color: var(--bg-color);
        }

        input[type="number"]:focus {
            border-color: var(--primary);
            background-color: var(--card-bg);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        button {
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 500;
            color: white;
            background-color: var(--primary);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .error-message {
            color: var(--error-color);
            text-align: center;
            min-height: 20px;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .results-section {
            display: none;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.4s ease-out;
        }

        .results-section.active {
            display: flex;
        }

        .row-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            align-self: flex-start;
            margin-bottom: 8px;
            margin-top: 16px;
            width: 100%;
        }

        .row-title:first-child {
            margin-top: 0;
        }

        .results-row {
            display: flex;
            width: 100%;
            overflow-x: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 8px;
            background: var(--bg-color);
            /* Hide scrollbar for cleaner look but keep functionality */
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .results-row::-webkit-scrollbar {
            display: none;
        }

        .result-cell {
            flex: 1;
            min-width: 120px;
            padding: 16px;
            text-align: center;
            border-right: 1px solid var(--border-color);
        }

        .result-cell:last-child {
            border-right: none;
        }

        .cell-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .cell-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-main);
        }

        .copy-btn {
            background-color: white;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
        }

        .copy-btn:hover {
            background-color: var(--bg-color);
        }

        .copy-btn svg {
            width: 18px;
            height: 18px;
        }

        .text-green {
            color: #059669 !important;
        }

        .text-blue {
            color: #2563EB !important;
        }

        .detail-cell {
            display: none;
        }

        .show-details .detail-cell {
            display: block;
        }

        .toggle-details-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: underline;
            padding: 0;
            margin-bottom: 16px;
            align-self: flex-start;
        }

        .toggle-details-btn:hover {
            background-color: transparent;
            color: var(--primary-hover);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive Design */
        @media (max-width: 900px) {
            .selection-group {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .input-group {
                flex-direction: column;
            }
            .container {
                padding: 24px 16px;
            }
            .result-cell {
                min-width: 100px;
                padding: 12px 8px;
            }
            .cell-value {
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .selection-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1><span class="text-blue">Mobi Hub</span> Calculator</h1>
        
        <div class="selection-group">
            <select id="deviceModel">
                <option value="">Select Model</option>
                <!-- iPhone 17 Series -->
                <option value="iPhone 17 Pro Max">iPhone 17 Pro Max</option>
                <option value="iPhone 17 Pro">iPhone 17 Pro</option>
                <option value="iPhone 17 Plus">iPhone 17 Plus</option>
                <option value="iPhone 17">iPhone 17</option>
                <!-- iPhone 16 Series -->
                <option value="iPhone 16 Pro Max">iPhone 16 Pro Max</option>
                <option value="iPhone 16 Pro">iPhone 16 Pro</option>
                <option value="iPhone 16 Plus">iPhone 16 Plus</option>
                <option value="iPhone 16">iPhone 16</option>
                <!-- iPhone 15 Series -->
                <option value="iPhone 15 Pro Max">iPhone 15 Pro Max</option>
                <option value="iPhone 15 Pro">iPhone 15 Pro</option>
                <option value="iPhone 15 Plus">iPhone 15 Plus</option>
                <option value="iPhone 15">iPhone 15</option>
                <!-- iPhone 14 Series -->
                <option value="iPhone 14 Pro Max">iPhone 14 Pro Max</option>
                <option value="iPhone 14 Pro">iPhone 14 Pro</option>
                <option value="iPhone 14 Plus">iPhone 14 Plus</option>
                <option value="iPhone 14">iPhone 14</option>
                <!-- iPhone 13 Series -->
                <option value="iPhone 13 Pro Max">iPhone 13 Pro Max</option>
                <option value="iPhone 13 Pro">iPhone 13 Pro</option>
                <option value="iPhone 13">iPhone 13</option>
                <option value="iPhone 13 mini">iPhone 13 mini</option>
                <!-- iPhone 12 Series -->
                <option value="iPhone 12 Pro Max">iPhone 12 Pro Max</option>
                <option value="iPhone 12 Pro">iPhone 12 Pro</option>
                <option value="iPhone 12">iPhone 12</option>
                <option value="iPhone 12 mini">iPhone 12 mini</option>
                <!-- iPhone 11 Series -->
                <option value="iPhone 11 Pro Max">iPhone 11 Pro Max</option>
                <option value="iPhone 11 Pro">iPhone 11 Pro</option>
                <option value="iPhone 11">iPhone 11</option>
                <!-- Older Models -->
                <option value="iPhone XS Max">iPhone XS Max</option>
                <option value="iPhone XS">iPhone XS</option>
                <option value="iPhone XR">iPhone XR</option>
                <option value="iPhone X">iPhone X</option>
                <option value="iPhone SE (3rd Gen)">iPhone SE (3rd Gen)</option>
                <option value="iPhone SE (2nd Gen)">iPhone SE (2nd Gen)</option>
                <option value="iPhone 8 Plus">iPhone 8 Plus</option>
                <option value="iPhone 8">iPhone 8</option>
            </select>

            <select id="deviceStorage">
                <option value="">Select Storage</option>
                <option value="64GB">64GB</option>
                <option value="128GB">128GB</option>
                <option value="256GB">256GB</option>
                <option value="512GB">512GB</option>
                <option value="1TB">1TB</option>
            </select>

            <select id="deviceGrade">
                <option value="">Select Grade</option>
                <option value="CPO">CPO</option>
                <option value="ASIS+">ASIS+</option>
                <option value="ASIS">ASIS</option>
                <option value="A/A+">A/A+</option>
                <option value="A++">A++</option>
                <option value="A">A</option>
                <option value="AB">AB</option>
                <option value="ABC">ABC</option>
                <option value="BC">BC</option>
            </select>

            <select id="deviceSpec">
                <option value="">Select Spec</option>
                <option value="EUR">EUR</option>
                <option value="CANADA">CANADA</option>
                <option value="JAPAN">JAPAN</option>
                <option value="INDIAN">INDIAN</option>
                <option value="ASIAN">ASIAN</option>
                <option value="Others">Others</option>
            </select>
        </div>
        
        <div class="input-group">
            <input type="number" id="basePrice" placeholder="Enter Base Price (X)" step="0.01" autocomplete="off">
            <button onclick="performCalculations()">Calculate</button>
        </div>
        
        <div id="errorMsg" class="error-message"></div>

        <div id="resultsSection" class="results-section">
            
            <button class="toggle-details-btn" id="toggleBtn" onclick="toggleDetails()">Show Details (Y & Z)</button>

            <div class="row-title">5% Client Profit</div>
            <div class="results-row">
                <div class="result-cell">
                    <div class="cell-label">X (Base)</div>
                    <div class="cell-value" id="valX1">0.00</div>
                </div>
                <div class="result-cell detail-cell">
                    <div class="cell-label">Y (-11%)</div>
                    <div class="cell-value" id="valY1">0.00</div>
                </div>
                <div class="result-cell detail-cell">
                    <div class="cell-label">Logistic Cost (Z)</div>
                    <div class="cell-value" id="valZ1">0.00</div>
                </div>
                <div class="result-cell">
                    <div class="cell-label text-blue">Client Price (A -5%)</div>
                    <div class="cell-value text-blue" id="valA">0.00</div>
                </div>
                <div class="result-cell">
                    <div class="cell-label text-green">Our Cost (P1 -3%)</div>
                    <div class="cell-value text-green" id="valP1">0.00</div>
                </div>
            </div>

            <div class="row-title">7% Client Profit</div>
            <div class="results-row">
                <div class="result-cell">
                    <div class="cell-label">X (Base)</div>
                    <div class="cell-value" id="valX2">0.00</div>
                </div>
                <div class="result-cell detail-cell">
                    <div class="cell-label">Y (-11%)</div>
                    <div class="cell-value" id="valY2">0.00</div>
                </div>
                <div class="result-cell detail-cell">
                    <div class="cell-label">Logistic Cost (Z)</div>
                    <div class="cell-value" id="valZ2">0.00</div>
                </div>
                <div class="result-cell">
                    <div class="cell-label text-blue">Client Price 2 (B -7%)</div>
                    <div class="cell-value text-blue" id="valB">0.00</div>
                </div>
                <div class="result-cell">
                    <div class="cell-label text-green">Our Cost (P2 -3%)</div>
                    <div class="cell-value text-green" id="valP2">0.00</div>
                </div>
            </div>

            <button class="copy-btn" id="copyBtn" onclick="copyResults()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                </svg>
                <span id="copyText">Copy Both Rows</span>
            </button>
        </div>
    </div>

    <script>
        const basePriceInput = document.getElementById('basePrice');

        // Listen for "Enter" key press on the input field (legacy support)
        basePriceInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                performCalculations();
            }
        });

        // Listen for real-time changes as the user types
        basePriceInput.addEventListener('input', performCalculations);

        function performCalculations() {
            const inputVal = basePriceInput.value;
            const errorMsg = document.getElementById('errorMsg');
            const resultsSection = document.getElementById('resultsSection');

            // Handle empty input gracefully by just hiding the results
            if (inputVal === '') {
                errorMsg.textContent = "";
                resultsSection.classList.remove('active');
                return;
            }

            // Validation for invalid numbers
            if (isNaN(inputVal) || Number(inputVal) <= 0) {
                errorMsg.textContent = "Please enter a valid positive number.";
                resultsSection.classList.remove('active');
                return;
            }

            errorMsg.textContent = "";

            // The Math
            const X = parseFloat(inputVal);
            const Y = X - (X * 0.11);
            const Z = Y - 25;  // Logistic Cost
            
            // Row 1 Calculations (5% Client, 3% SP1)
            const A = Z - (Z * 0.05);
            const P1 = A - (A * 0.03);

            // Row 2 Calculations (7% Client, 3% SP2)
            const B = Z - (Z * 0.07);
            const P2 = B - (B * 0.03);

            // Update DOM with 2 decimal formatting for Row 1
            document.getElementById('valX1').textContent = X.toFixed(2);
            document.getElementById('valY1').textContent = Y.toFixed(2);
            document.getElementById('valZ1').textContent = Z.toFixed(2);
            document.getElementById('valA').textContent = A.toFixed(2);
            document.getElementById('valP1').textContent = P1.toFixed(2);

            // Update DOM with 2 decimal formatting for Row 2
            document.getElementById('valX2').textContent = X.toFixed(2);
            document.getElementById('valY2').textContent = Y.toFixed(2);
            document.getElementById('valZ2').textContent = Z.toFixed(2);
            document.getElementById('valB').textContent = B.toFixed(2);
            document.getElementById('valP2').textContent = P2.toFixed(2);

            // Show Results
            resultsSection.classList.add('active');
        }

        function toggleDetails() {
            const section = document.getElementById('resultsSection');
            const btn = document.getElementById('toggleBtn');
            
            section.classList.toggle('show-details');
            
            if (section.classList.contains('show-details')) {
                btn.textContent = 'Hide Details (Y & Z)';
            } else {
                btn.textContent = 'Show Details (Y & Z)';
            }
        }

        function copyResults() {
            const isShowingDetails = document.getElementById('resultsSection').classList.contains('show-details');

            // --- Device Details Extraction ---
            const model = document.getElementById('deviceModel').value;
            const storage = document.getElementById('deviceStorage').value;
            const grade = document.getElementById('deviceGrade').value;
            const spec = document.getElementById('deviceSpec').value;

            let deviceDetails = [];
            if(model) deviceDetails.push(model);
            if(storage) deviceDetails.push(storage);
            if(grade) deviceDetails.push(`Grade: ${grade}`);
            if(spec) deviceDetails.push(`Spec: ${spec}`);
            
            let headerText = "";
            if (deviceDetails.length > 0) {
                // Using WhatsApp bold formatting around the device details
                headerText = `*${deviceDetails.join(' | ')}*\n\n`;
            }

            // Retrieve calculated values for Row 1
            const X1 = document.getElementById('valX1').textContent;
            const Y1 = document.getElementById('valY1').textContent;
            const Z1 = document.getElementById('valZ1').textContent;
            const A = document.getElementById('valA').textContent;
            const P1 = document.getElementById('valP1').textContent;

            // Retrieve calculated values for Row 2
            const X2 = document.getElementById('valX2').textContent;
            const Y2 = document.getElementById('valY2').textContent;
            const Z2 = document.getElementById('valZ2').textContent;
            const B = document.getElementById('valB').textContent;
            const P2 = document.getElementById('valP2').textContent;

            // Format strings based on visibility
            let row1Copy = `5% Client Profit: ${X1}`;
            let row2Copy = `7% Client Profit: ${X2}`;

            if (isShowingDetails) {
                row1Copy += ` | ${Y1} | ${Z1}`;
                row2Copy += ` | ${Y2} | ${Z2}`;
            }

            row1Copy += ` | ${A} | ${P1}`;
            row2Copy += ` | ${B} | ${P2}`;

            const copyString = `${headerText}${row1Copy}\n${row2Copy}`;

            // Create temporary textarea to facilitate copying
            const textarea = document.createElement('textarea');
            textarea.value = copyString;
            
            // Move it off-screen
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            textarea.style.top = '0';
            
            document.body.appendChild(textarea);
            textarea.select();

            const copyBtnText = document.getElementById('copyText');
            const originalText = copyBtnText.textContent;

            try {
                // The standard execCommand is used here as requested to ensure iframe compatibility 
                document.execCommand('copy');
                // Provide visual feedback
                copyBtnText.textContent = "Copied Both Rows!";
                setTimeout(() => {
                    copyBtnText.textContent = originalText;
                }, 2000);
            } catch (err) {
                // Error feedback
                copyBtnText.textContent = "Failed to copy";
                setTimeout(() => {
                    copyBtnText.textContent = originalText;
                }, 2000);
            } finally {
                document.body.removeChild(textarea);
            }
        }
    </script>
</body>
</html>
